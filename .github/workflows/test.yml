name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: ankey_test_core
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Setup test database
        run: |
          # Create test databases
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE ankey_test_core;"
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE ankey_test_tenant_default;"
        env:
          PGPASSWORD: postgres

      - name: Setup environment
        run: |
          cp .env.test .env
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/ankey_test_core" >> .env
          echo "TENANT_DATABASE_PREFIX=ankey_test_tenant" >> .env

      - name: Run TypeScript check
        run: bun run tsc --noEmit

      - name: Run linter
        run: bun run lint

      - name: Run unit tests
        run: bun run test:unit
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ankey_test_core
          NODE_ENV: test

      - name: Run integration tests
        run: bun run test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ankey_test_core
          NODE_ENV: test

      - name: Run database tests
        run: bun run test:db
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ankey_test_core
          NODE_ENV: test

      - name: Generate coverage report
        run: bun run test:coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ankey_test_core
          NODE_ENV: test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Run security audit
        run: bun audit

      - name: Check for vulnerabilities
        run: |
          # Add security scanning tools as needed
          echo "Security check completed"

  build:
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build

      - name: Check build artifacts
        run: |
          ls -la dist/
          echo "Build completed successfully"